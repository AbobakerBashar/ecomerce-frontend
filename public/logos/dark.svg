      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
  </defs>

  <!-- Dark background app icon -->
  <rect x="10" y="10" width="120" height="120" rx="28" fill="#0D0D1A"/>
  <rect x="14" y="14" width="112" height="112" rx="24" fill="url(#brandGradient)" opacity="0.15"/>
  
  <!-- Shopping Bag (dark mode) -->
  <path d="M45 50 L45 40 C45 32 55 32 55 40 L55 50" 
